<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Track Your Order — Aneesa Hampers</title>
  <meta name="description" content="Track your Aneesa Hampers order in real-time. Enter your Order ID to see live status from preparation to delivery."/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--blush:#f9e4e9;--rose:#e8a0b0;--deep-rose:#c0647a;--burgundy:#3b0d1a;--cream:#fdf6f0;--gold:#c9a96e;--white:#fff;--green:#25D366;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--burgundy);min-height:100vh;overflow-x:hidden;}
    @media(pointer:fine){body{cursor:none;}.cursor{width:10px;height:10px;background:var(--deep-rose);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}.cursor-ring{width:30px;height:30px;border:1.5px solid var(--deep-rose);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .1s,top .1s;opacity:.4;}}
    @media(pointer:coarse){.cursor,.cursor-ring{display:none;}body{cursor:auto;}button,a,[onclick],input{cursor:pointer;}}
    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:64px;background:rgba(253,246,240,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(192,100,122,.1);}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-style:italic;color:var(--burgundy);}
    .nav-logo-text span{color:var(--deep-rose);}
    .nav-links{display:flex;gap:32px;list-style:none;}
    .nav-links a{text-decoration:none;font-size:.72rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--burgundy);opacity:.5;transition:all .3s;}
    .nav-links a:hover{opacity:1;color:var(--deep-rose);}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .nav-cart{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--burgundy);font-size:.74rem;letter-spacing:2px;text-transform:uppercase;padding:7px 12px;border-radius:8px;border:1.5px solid rgba(192,100,122,.2);transition:background .2s;}
    .nav-cart:hover{background:var(--blush);}
    .cart-count{background:var(--deep-rose);color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;}
    /* HERO */
    .hero{padding:110px 60px 50px;text-align:center;}
    .hero-tag{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--deep-rose);opacity:.7;margin-bottom:10px;}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;line-height:1.2;margin-bottom:12px;}
    .hero-title em{font-style:italic;color:var(--deep-rose);}
    .hero-sub{font-size:.88rem;opacity:.5;max-width:500px;margin:0 auto 36px;line-height:1.8;}
    /* SEARCH BOX */
    .search-wrap{max-width:540px;margin:0 auto 60px;}
    .search-box{display:flex;background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 4px 30px rgba(192,100,122,.12);border:1.5px solid rgba(192,100,122,.15);}
    .search-box input{flex:1;padding:16px 20px;border:none;outline:none;font-family:'Jost',sans-serif;font-size:.92rem;color:var(--burgundy);background:transparent;cursor:text;}
    .search-box input::placeholder{opacity:.4;}
    .search-btn{padding:14px 26px;background:var(--burgundy);color:white;border:none;font-family:'Jost',sans-serif;font-size:.76rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
    .search-btn:hover{background:var(--deep-rose);}
    .search-hint{font-size:.75rem;opacity:.4;text-align:center;margin-top:10px;}
    /* RESULT AREA */
    #resultArea{max-width:700px;margin:0 auto;padding:0 60px 80px;}
    /* NOT FOUND */
    .not-found{text-align:center;padding:50px 20px;background:var(--white);border-radius:20px;}
    .not-found-icon{font-size:3rem;margin-bottom:16px;}
    .not-found-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:8px;}
    .not-found-sub{font-size:.83rem;opacity:.5;line-height:1.7;}
    /* ORDER CARD */
    .order-card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 4px 30px rgba(192,100,122,.1);}
    .order-header{background:linear-gradient(135deg,var(--burgundy),#5a1528);padding:24px 28px;color:white;}
    .order-header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
    .order-id{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;}
    .order-id strong{color:var(--rose);}
    .order-date{font-size:.74rem;opacity:.5;margin-top:3px;}
    .status-pill{padding:6px 16px;border-radius:30px;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
    .status-pill.pending{background:rgba(201,169,110,.2);color:var(--gold);}
    .status-pill.confirmed{background:rgba(64,128,192,.2);color:#7ab8f5;}
    .status-pill.preparing{background:rgba(192,120,48,.2);color:#f5b87a;}
    .status-pill.shipped{background:rgba(100,160,100,.2);color:#a0e0a0;}
    .status-pill.delivered{background:rgba(45,122,79,.2);color:#78d4a0;}
    .status-pill.cancelled{background:rgba(224,80,80,.2);color:#f59090;}
    /* TRACKING TIMELINE */
    .tracking-wrap{padding:28px;}
    .track-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin-bottom:24px;}
    .track-title em{font-style:italic;color:var(--deep-rose);}
    .timeline{position:relative;padding-left:36px;}
    .timeline::before{content:'';position:absolute;left:12px;top:8px;bottom:8px;width:2px;background:var(--blush);}
    .t-step{position:relative;margin-bottom:28px;}
    .t-step:last-child{margin-bottom:0;}
    .t-dot{position:absolute;left:-30px;top:4px;width:20px;height:20px;border-radius:50%;border:2.5px solid var(--blush);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .4s;}
    .t-step.done .t-dot{background:var(--burgundy);border-color:var(--burgundy);color:white;}
    .t-step.current .t-dot{background:var(--deep-rose);border-color:var(--deep-rose);color:white;box-shadow:0 0 0 4px rgba(192,100,122,.2);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(192,100,122,.2)}50%{box-shadow:0 0 0 8px rgba(192,100,122,.1)}}
    .t-step.done .t-line,.t-step.current .t-line{background:var(--burgundy);}
    .t-label{font-size:.88rem;font-weight:500;margin-bottom:3px;}
    .t-step.done .t-label{color:var(--burgundy);}
    .t-step:not(.done):not(.current) .t-label{opacity:.35;}
    .t-desc{font-size:.76rem;opacity:.45;line-height:1.6;}
    .t-step.current .t-desc{opacity:.7;color:var(--deep-rose);}
    .t-time{font-size:.7rem;opacity:.35;margin-top:2px;}
    /* ORDER DETAILS */
    .order-details{padding:0 28px 28px;}
    .detail-section{margin-bottom:22px;}
    .detail-heading{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;opacity:.38;margin-bottom:12px;}
    .detail-row{display:flex;justify-content:space-between;font-size:.83rem;margin-bottom:8px;}
    .detail-row span:first-child{opacity:.55;}
    .items-list-track{display:flex;flex-direction:column;gap:10px;}
    .track-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--blush);border-radius:12px;}
    .track-item-img{width:50px;height:50px;border-radius:9px;object-fit:cover;background:var(--rose);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
    .track-item-img img{width:100%;height:100%;object-fit:cover;border-radius:9px;}
    .track-item-name{font-size:.84rem;font-weight:500;}
    .track-item-qty{font-size:.75rem;opacity:.5;margin-top:2px;}
    .track-item-price{margin-left:auto;font-size:.84rem;font-weight:500;color:var(--deep-rose);}
    .price-summary{background:var(--blush);border-radius:12px;padding:16px;}
    .price-row{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:8px;opacity:.65;}
    .price-row.total{opacity:1;font-weight:600;font-size:.95rem;border-top:1px solid rgba(192,100,122,.15);padding-top:10px;margin-top:4px;}
    /* WA HELP BTN */
    .wa-help{display:flex;align-items:center;justify-content:center;gap:8px;margin:22px 28px 28px;padding:13px;background:var(--green);color:white;border-radius:14px;text-decoration:none;font-size:.79rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:opacity .3s;}
    .wa-help:hover{opacity:.88;}
    /* FLOAT WA */
    #floatWA{position:fixed;bottom:26px;right:26px;z-index:500;display:flex;align-items:center;gap:9px;background:var(--green);color:white;border-radius:50px;padding:12px 20px;font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;font-weight:500;text-decoration:none;box-shadow:0 6px 28px rgba(37,211,102,.4);animation:floatA 2.5s ease-in-out infinite;}
    @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    /* LOADING */
    .spin{width:28px;height:28px;border:2px solid rgba(192,100,122,.3);border-top-color:var(--deep-rose);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){
      nav{padding:0 16px 0 68px;height:60px;}.nav-links{display:none;}
      .hero{padding:80px 18px 36px;}
      .hero-title{font-size:2.2rem;}
      #resultArea{padding:0 16px 100px;}
      .search-wrap{padding:0 16px;margin-bottom:0;}
      #floatWA{display:none!important;}
    }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-text"><span>Aneesa</span> Hampers</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Collections</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="login.html">Account</a></li>
  </ul>
  <div class="nav-right">
    <a href="cart.html" class="nav-cart">🛍️ <span class="cart-count" id="cartBadge">0</span></a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">Real-time tracking</div>
  <div class="hero-title">Track Your <em>Order</em></div>
  <div class="hero-sub">Enter your Order ID to see live status — from preparation to delivery at your doorstep.</div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="orderInput" placeholder="Enter Order ID  e.g. ABC123" maxlength="20"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter') trackOrder()"/>
      <button class="search-btn" onclick="trackOrder()">Track →</button>
    </div>
    <div class="search-hint">Your Order ID was sent via WhatsApp after payment</div>
  </div>
</div>

<!-- RESULT -->
<div id="resultArea"></div>

<a href="#" id="floatWA">💬 Need Help?</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc, orderBy, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyCT98OpXIDMCHEiZl6PRrQ6GDziOo2hnTM",authDomain:"aneesa-hampers.firebaseapp.com",projectId:"aneesa-hampers",storageBucket:"aneesa-hampers.firebasestorage.app",messagingSenderId:"909653560410",appId:"1:909653560410:web:397db4fec2d9f042609c63"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const WA_NUM='918639066613';

// CURSOR
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
if(cur&&matchMedia('(pointer:fine)').matches){
  document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80);});
}

// CART BADGE — use user-specific key
try{
  const _u = JSON.parse(localStorage.getItem('ah_user')||'null');
  const _cKey = _u?.uid ? 'ah_cart_'+_u.uid : 'ah_cart_guest';
  const c=JSON.parse(localStorage.getItem(_cKey)||'[]');
  document.getElementById('cartBadge').textContent=c.reduce((s,i)=>s+(i.qty||1),0);
}catch{}

// FLOAT WA
document.getElementById('floatWA').onclick=e=>{e.preventDefault();window.open(`https://wa.me/${WA_NUM}?text=Hi! I need help tracking my order.`,'_blank');};

// AUTO-TRACK IF URL HAS ?id=
const urlId=new URLSearchParams(location.search).get('id');
if(urlId){document.getElementById('orderInput').value=urlId.toUpperCase();trackOrder();}

// TRACKING STEPS
const STEPS=[
  {key:'pending',    icon:'🕐', label:'Order Placed',      desc:'We have received your order and payment.'},
  {key:'confirmed',  icon:'✅', label:'Order Confirmed',   desc:'Your order has been confirmed by Aneesa Hampers.'},
  {key:'preparing',  icon:'🎀', label:'Being Prepared',    desc:'Your hamper is being carefully handcrafted with love.'},
  {key:'shipped',    icon:'🚚', label:'Out for Delivery',  desc:'Your order is on the way to your address!'},
  {key:'delivered',  icon:'🎁', label:'Delivered',         desc:'Your hamper has been delivered. Enjoy!'},
];

const STATUS_ORDER=['pending','confirmed','preparing','shipped','delivered'];

let liveUnsubscribe=null;

window.trackOrder=async()=>{
  const raw=document.getElementById('orderInput').value.trim().toUpperCase();
  if(!raw||raw.length<4){
    document.getElementById('resultArea').innerHTML=`<div class="not-found"><div class="not-found-icon">🔍</div><div class="not-found-title">Enter Order ID</div><div class="not-found-sub">Please enter your Order ID to track your order.<br/>It was sent via WhatsApp after you placed your order.</div></div>`;
    return;
  }

  // Show loading
  document.getElementById('resultArea').innerHTML=`<div style="text-align:center"><div class="spin"></div><p style="opacity:.4;font-size:.82rem">Searching for your order...</p></div>`;

  // Unsubscribe previous listener
  if(liveUnsubscribe) liveUnsubscribe();

  try{
    // Search by last 6 chars of doc ID (how we show order ID to user)
    // First try direct doc ID match
    let orderDoc=null;
    let orderId=null;

    // Try searching all orders where ID ends with the input
    const allSnap=await getDocs(collection(db,'orders'));
    allSnap.forEach(d=>{
      if(d.id.slice(-6).toUpperCase()===raw || d.id.toUpperCase()===raw){
        orderDoc={id:d.id,...d.data()};
        orderId=d.id;
      }
    });

    if(!orderDoc){
      document.getElementById('resultArea').innerHTML=`
        <div class="not-found">
          <div class="not-found-icon">😕</div>
          <div class="not-found-title">Order Not Found</div>
          <div class="not-found-sub">We could not find an order with ID <strong>${raw}</strong>.<br/>Please check your WhatsApp message for the correct Order ID.<br/><br/>Need help? Contact us on WhatsApp!</div>
          <a href="https://wa.me/${WA_NUM}?text=Hi! I cannot find my order. ID: ${raw}" target="_blank" style="display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:11px 22px;background:var(--green);color:white;border-radius:30px;text-decoration:none;font-size:.76rem;letter-spacing:1.5px;text-transform:uppercase;cursor:none">💬 Contact on WhatsApp</a>
        </div>`;
      return;
    }

    // LIVE LISTENER for real-time updates
    liveUnsubscribe=onSnapshot(doc(db,'orders',orderId), snap=>{
      if(!snap.exists()) return;
      renderOrder({id:snap.id,...snap.data()});
    });

  }catch(e){
    document.getElementById('resultArea').innerHTML=`<div class="not-found"><div class="not-found-icon">❌</div><div class="not-found-title">Error</div><div class="not-found-sub">Something went wrong. Please try again.</div></div>`;
    console.error(e);
  }
};

function renderOrder(o){
  const status=o.status||'pending';
  const currentIdx=STATUS_ORDER.indexOf(status);
  const isCancelled=status==='cancelled';

  // Format date
  const dateStr=o.createdAt?.toDate?o.createdAt.toDate().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'Recently';

  // TIMELINE HTML
  const timelineHtml=isCancelled?
    `<div class="t-step current">
      <div class="t-dot">✕</div>
      <div class="t-label" style="color:#e05050">Order Cancelled</div>
      <div class="t-desc" style="color:#e05050">This order has been cancelled. Contact us on WhatsApp for help.</div>
    </div>`
    :
    STEPS.map((step,i)=>{
      const isDone=i<currentIdx;
      const isCurrent=i===currentIdx;
      return `<div class="t-step ${isDone?'done':''} ${isCurrent?'current':''}">
        <div class="t-dot">${isDone?'✓':step.icon}</div>
        <div class="t-label">${step.label}</div>
        <div class="t-desc">${isCurrent?'<strong>'+step.desc+'</strong>':step.desc}</div>
        ${isCurrent?`<div class="t-time" style="color:var(--deep-rose);opacity:.8">● Live update</div>`:''}
      </div>`;
    }).join('');

  // ITEMS HTML
  const itemsHtml=(o.items||[]).map(item=>`
    <div class="track-item">
      <div class="track-item-img">${item.image?`<img src="${item.image}" alt="${item.name}"/>`:item.emoji||'🎁'}</div>
      <div>
        <div class="track-item-name">${item.name}</div>
        <div class="track-item-qty">Qty: ${item.qty||1}</div>
      </div>
      <div class="track-item-price">₹${(item.price*(item.qty||1)).toLocaleString()}</div>
    </div>`).join('');

  // STATUS EMOJI for header
  const statusEmojis={pending:'🕐',confirmed:'✅',preparing:'🎀',shipped:'🚚',delivered:'🎁',cancelled:'❌'};
  const statusLabels={pending:'Order Placed',confirmed:'Confirmed',preparing:'Preparing',shipped:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'};

  document.getElementById('resultArea').innerHTML=`
    <div class="order-card">
      <!-- HEADER -->
      <div class="order-header">
        <div class="order-header-top">
          <div>
            <div class="order-id">Order <strong>#${o.id.slice(-6).toUpperCase()}</strong></div>
            <div class="order-date">Placed on ${dateStr}</div>
          </div>
          <div class="status-pill ${status}">${statusEmojis[status]||'📦'} ${statusLabels[status]||status}</div>
        </div>
      </div>

      <!-- TRACKING TIMELINE -->
      <div class="tracking-wrap">
        <div class="track-title">Order <em>Timeline</em></div>
        <div class="timeline">${timelineHtml}</div>
      </div>

      <!-- DIVIDER -->
      <div style="height:1px;background:rgba(192,100,122,.08);margin:0 28px"></div>

      <!-- ORDER DETAILS -->
      <div class="order-details">
        <!-- DELIVERY INFO -->
        <div class="detail-section">
          <div class="detail-heading">Delivery Details</div>
          <div class="detail-row"><span>Name</span><span><strong>${o.name||'—'}</strong></span></div>
          <div class="detail-row"><span>Phone</span><span>${o.phone||'—'}</span></div>
          <div class="detail-row"><span>Address</span><span style="text-align:right;max-width:250px">${o.address||'—'}, ${o.city||''} ${o.pincode?'- '+o.pincode:''}</span></div>
          <div class="detail-row"><span>Delivery Type</span><span>${o.deliveryType==='express'?'⚡ Express':o.deliveryType==='pickup'?'🏪 Self Pickup':'🚚 Standard'}</span></div>
          ${o.giftMessage?`<div class="detail-row"><span>Gift Message</span><span style="text-align:right;max-width:220px;font-style:italic">"${o.giftMessage}"</span></div>`:''}
        </div>

        <!-- ITEMS -->
        <div class="detail-section">
          <div class="detail-heading">Items Ordered</div>
          <div class="items-list-track">${itemsHtml}</div>
        </div>

        <!-- PRICE -->
        <div class="detail-section">
          <div class="detail-heading">Price Summary</div>
          <div class="price-summary">
            <div class="price-row"><span>Subtotal</span><span>₹${Number(o.subtotal||0).toLocaleString()}</span></div>
            ${o.discount>0?`<div class="price-row" style="color:#2d7a4f"><span>Discount</span><span>-₹${Number(o.discount).toLocaleString()}</span></div>`:''}
            <div class="price-row"><span>Delivery</span><span>${o.deliveryFee?'₹'+o.deliveryFee:'FREE'}</span></div>
            <div class="price-row total"><span>Total Paid</span><span>₹${Number(o.total||0).toLocaleString()}</span></div>
          </div>
        </div>
      </div>

      <!-- WHATSAPP HELP -->
      <a class="wa-help" href="https://wa.me/${WA_NUM}?text=${encodeURIComponent(`Hi! I need help with my order #${o.id.slice(-6).toUpperCase()}`)}" target="_blank">
        💬 Need Help? Chat on WhatsApp
      </a>
    </div>`;
}
</script>

<script src="mobilenav.js"></script>
<script src="bottomnav.js"></script>
</body>
</html>
